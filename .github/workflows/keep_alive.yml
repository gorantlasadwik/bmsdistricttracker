name: Keep Render Service Awake 24/7

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Health Endpoint
        run: |
          RENDER_URL="${{ secrets.RENDER_APP_URL }}"
          if [ -z "$RENDER_URL" ]; then
            # Default fallback if secret is not configured
            RENDER_URL="https://bmsdistricttracker.onrender.com"
          fi
          echo "Pinging ${RENDER_URL}/health ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${RENDER_URL}/health" || echo "failed")
          echo "HTTP Response Status: ${STATUS}"
