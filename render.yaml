services:
  - type: web
    name: showpulser
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GREENAPI_INSTANCE_ID
        sync: false
      - key: GREENAPI_API_TOKEN
        sync: false
      - key: GREENAPI_RECIPIENT
        sync: false
      - key: GREENAPI_API_URL
        sync: false
      - key: ENABLED_NOTIFIERS
        value: telegram,whatsapp
      - key: SCAN_INTERVAL_SECONDS
        value: "180"
