version: "3.9"

services:
  showpulser:
    build: .
    container_name: showpulser
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist database, snapshots, and logs outside the container
      - ./data:/app/data
      - ./snapshots:/app/snapshots
      - ./logs:/app/logs
    environment:
      - DATABASE_PATH=/app/data/showpulser.db
      - SNAPSHOTS_DIR=/app/snapshots
      - LOGS_DIR=/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
